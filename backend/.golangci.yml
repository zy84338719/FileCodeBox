run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
    
    - linters:
        - errcheck
      text: "Error return value of .(Close|Write|Remove|Shutdown|Sscanf). is not checked"
